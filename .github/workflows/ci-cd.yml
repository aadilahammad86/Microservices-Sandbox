name: Microservices CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # github.repository defaults to username/repo-name
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies and Run tests
        working-directory: ./api
        run: |
          npm ci || npm install
          npm test

  build-and-push:
    name: Build & Push Docker Images
    needs: test
    runs-on: ubuntu-latest
    # Only push to registry if it's a push to main (not a PR)
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./api
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-backend:latest, ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-frontend:latest, ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
